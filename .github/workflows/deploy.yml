name: Deploy static site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update sitemap lastmod for deploy
        run: |
          if [ -f sitemap.xml ]; then
            ISODATE=$(date +%Y-%m-%d)
            sed -i "s/<lastmod>.*<\/lastmod>/<lastmod>${ISODATE}<\/lastmod>/g" sitemap.xml
          fi

      - name: Prepare site artifact
        run: |
          mkdir -p _site
          for item in index.html 404.html CNAME robots.txt sitemap.xml about categories contact css imgs js privacy services terms; do
            cp -a "$item" _site/
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
